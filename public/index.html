<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chọn Môn Học</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #e6f4ff 0%, #f0f5ff 100%);
      min-height: 100vh;
      color: #262626;
    }

    .header {
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-logo { font-weight: 700; font-size: 1rem; color: #1890ff; }
    .header-link { font-size: .85rem; color: #8c8c8c; text-decoration: none; }
    .header-link:hover { color: #1890ff; }

    /* Container duy nhất căn giữa */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 24px 48px;
    }

    /* Hero */
    .hero { text-align: center; margin-bottom: 20px; }
    .hero-icon { font-size: 40px; display: block; margin-bottom: 10px; }
    .hero h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }
    .hero p { color: #8c8c8c; font-size: .88rem; }

    /* Input — giới hạn 400px, căn giữa trong container */
    .name-box { max-width: 400px; margin: 0 auto 24px; }
    .name-box label { display: block; font-size: .88rem; font-weight: 600; color: #595959; margin-bottom: 7px; }
    .name-box input {
      width: 100%; height: 44px; padding: 0 14px;
      border: 1.5px solid #d9d9d9; border-radius: 8px;
      font-size: .95rem; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .name-box input:focus { border-color: #1890ff; box-shadow: 0 0 0 3px rgba(24,144,255,.12); }
    .name-error { color: #ff4d4f; font-size: .8rem; margin-top: 5px; display: none; }
    .name-error.show { display: block; }

    /* Grid */
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }
    .card { width: 230px; flex-shrink: 0; }

    /* Card */
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      padding: 22px 20px;
      text-align: center;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all .2s;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 6px 24px rgba(0,0,0,.12); border-color: #1890ff; }
    .card-icon { font-size: 36px; display: block; margin-bottom: 10px; }
    .card-title { font-size: 1rem; font-weight: 800; margin-bottom: 3px; }
    .card-grade { font-size: .78rem; color: #8c8c8c; margin-bottom: 12px; }
    .card-tags { display: flex; justify-content: center; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
    .tag { background: #f5f5f5; color: #8c8c8c; border-radius: 20px; padding: 2px 9px; font-size: .75rem; font-weight: 600; }
    .tag.blue { background: #e6f4ff; color: #1890ff; }
    .card-btn {
      width: 100%; height: 38px;
      background: #1890ff; color: #fff;
      border: none; border-radius: 8px;
      font-size: .88rem; font-weight: 700;
      cursor: pointer; transition: background .15s;
    }
    .card-btn:hover { background: #0c6dbd; }
    .loading { text-align: center; color: #8c8c8c; padding: 32px; }

    @media (max-width: 600px) {
      .header { padding: 12px 16px; }
      .container { padding: 24px 16px 40px; }
      .hero h1 { font-size: 1.3rem; }
      .name-box { max-width: 100%; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">🎓 Hệ thống Trắc nghiệm</div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span id="header-student" style="font-size:.85rem;color:#595959;font-weight:600;"></span>
    <button id="btn-history" onclick="showHistory()" style="display:none;background:#e6f4ff;color:#1890ff;border:none;border-radius:6px;padding:6px 12px;font-size:.82rem;font-weight:600;cursor:pointer;">📋 Lịch sử</button>
    <button id="btn-logout" onclick="doLogout()" style="display:none;background:none;border:1px solid #d9d9d9;border-radius:6px;padding:6px 12px;font-size:.82rem;color:#8c8c8c;cursor:pointer;">Đăng xuất</button>
    <a href="teacher.html" class="header-link">🔑 Giáo viên</a>
  </div>
</div>

<div class="container">

  <div class="hero">
    <span class="hero-icon">📝</span>
    <h1>Chọn Môn Học</h1>
    <p>Chọn môn để xem danh sách bài</p>
  </div>

  <div class="grid" id="grid">
    <div class="loading">⏳ Đang tải...</div>
  </div>

</div>

<!-- Modal lịch sử -->
<div id="history-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:20px;">
  <div style="background:#fff;border-radius:14px;width:100%;max-width:520px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.18);">
    <div style="display:flex;align-items:center;padding:18px 20px;border-bottom:1px solid #f0f0f0;">
      <span style="font-size:1rem;font-weight:700;color:#262626;flex:1;">📋 Lịch sử làm bài</span>
      <button onclick="closeHistory()" style="background:none;border:none;font-size:1.2rem;cursor:pointer;color:#8c8c8c;">✕</button>
    </div>
    <div id="history-body" style="overflow-y:auto;flex:1;"></div>
  </div>
</div>

<script>
// ===== KIỂM TRA ĐĂNG NHẬP =====
let studentToken = localStorage.getItem('student_token');
let studentFullname = localStorage.getItem('student_fullname') || '';
let studentUsername = localStorage.getItem('student_username') || '';

async function checkAuth() {
  if (!studentToken) { location.href = 'student-login.html'; return; }
  const res = await fetch('/api/student-auth-check', { headers: { 'x-student-token': studentToken } });
  const data = await res.json();
  if (!data.ok) {
    localStorage.removeItem('student_token');
    localStorage.removeItem('student_username');
    localStorage.removeItem('student_fullname');
    location.href = 'student-login.html';
    return;
  }
  studentFullname = data.fullname;
  studentUsername = data.username;
  localStorage.setItem('student_fullname', data.fullname);
  document.getElementById('header-student').textContent = '👤 ' + data.fullname;
  document.getElementById('btn-logout').style.display = 'block';
  document.getElementById('btn-history').style.display = 'block';
  load();
}

function doLogout() {
  fetch('/api/student-logout', { method: 'POST', headers: { 'x-student-token': studentToken } });
  localStorage.removeItem('student_token');
  localStorage.removeItem('student_username');
  localStorage.removeItem('student_fullname');
  location.href = 'student-login.html';
}

// ===== LOAD GROUPS =====
async function load() {
  try {
    const res = await fetch('/api/groups');
    const groups = await res.json();
    const grid = document.getElementById('grid');
    if (!groups.length) { grid.innerHTML = '<div class="loading">Chưa có môn nào.</div>'; return; }
    grid.innerHTML = groups.map(g => `
      <div class="card" onclick="go('${g.id}')">
        <span class="card-icon">${g.icon}</span>
        <div class="card-title">${g.title}</div>
        <div class="card-grade">${g.grade}</div>
        <div class="card-tags">
          <span class="tag blue">${g.lessons.length} bài</span>
          <span class="tag">${g.subject}</span>
        </div>
        <button class="card-btn">Xem danh sách bài →</button>
      </div>
    `).join('');
  } catch {
    document.getElementById('grid').innerHTML = '<div class="loading">❌ Không thể kết nối server</div>';
  }
}

function go(groupId) {
  sessionStorage.setItem('student_name', studentFullname);
  location.href = `lessons.html?group=${groupId}`;
}

// ===== LỊCH SỬ LÀM BÀI =====
async function showHistory() {
  const modal = document.getElementById('history-modal');
  const body = document.getElementById('history-body');
  modal.style.display = 'flex';
  body.innerHTML = '<div style="text-align:center;padding:32px;color:#8c8c8c;">⏳ Đang tải...</div>';

  try {
    const res = await fetch('/api/student/history', { headers: { 'x-student-token': studentToken } });
    const history = await res.json();
    if (!history.length) {
      body.innerHTML = '<div style="text-align:center;padding:32px;color:#8c8c8c;">Bạn chưa làm bài nào.</div>';
      return;
    }
    body.innerHTML = history.map(h => {
      const pct = Math.round(h.score / h.total * 100);
      const score10 = (Math.round(h.score / h.total * 100) / 10).toFixed(1);
      const cls = pct >= 80 ? '#52c41a' : pct >= 50 ? '#fa8c16' : '#ff4d4f';
      const date = new Date(h.submitted_at).toLocaleString('vi-VN');
      const wrong = h.wrong ?? (h.total - h.score - (h.skip ?? 0));
      const skip = h.skip ?? 0;
      return `<div style="padding:14px 16px;border-bottom:1px solid #f0f0f0;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="font-size:26px;width:36px;text-align:center;flex-shrink:0;">${h.subject_title?.includes('Toán') ? '📐' : '📖'}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:700;font-size:.92rem;color:#262626;">${h.subject_title}</div>
            <div style="font-size:.75rem;color:#8c8c8c;margin-top:2px;">${date}${h.attempt ? ` · Lần ${h.attempt}` : ''}</div>
          </div>
          <div style="text-align:right;flex-shrink:0;">
            <div style="font-size:1.3rem;font-weight:800;color:${cls};">${score10}<span style="font-size:.75rem;font-weight:400;color:#8c8c8c;">/10</span></div>
            <div style="font-size:.72rem;color:#8c8c8c;">${h.score}/${h.total} câu</div>
          </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:8px;padding-left:48px;">
          <span style="background:#f6ffed;color:#52c41a;border-radius:20px;padding:2px 9px;font-size:.75rem;font-weight:600;">✓ ${h.score} đúng</span>
          <span style="background:#fff2f0;color:#ff4d4f;border-radius:20px;padding:2px 9px;font-size:.75rem;font-weight:600;">✗ ${wrong} sai</span>
          ${skip > 0 ? `<span style="background:#f5f5f5;color:#8c8c8c;border-radius:20px;padding:2px 9px;font-size:.75rem;font-weight:600;">— ${skip} bỏ qua</span>` : ''}
        </div>
      </div>`;
    }).join('');
  } catch {
    body.innerHTML = '<div style="text-align:center;padding:32px;color:#ff4d4f;">Lỗi kết nối.</div>';
  }
}

function closeHistory() {
  document.getElementById('history-modal').style.display = 'none';
}

document.addEventListener('DOMContentLoaded', checkAuth);
</script>
</body>
</html>
