<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng nhập Học Sinh</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #e6f4ff 0%, #f0f5ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.1);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .logo { font-size: 48px; margin-bottom: 12px; }
    h1 { font-size: 1.4rem; font-weight: 800; color: #262626; margin-bottom: 6px; }
    .sub { font-size: .88rem; color: #8c8c8c; margin-bottom: 28px; }
    .form-group { text-align: left; margin-bottom: 14px; }
    label { display: block; font-size: .85rem; font-weight: 600; color: #595959; margin-bottom: 6px; }
    input {
      width: 100%; height: 44px; padding: 0 14px;
      border: 1.5px solid #d9d9d9; border-radius: 8px;
      font-size: .95rem; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus { border-color: #1890ff; box-shadow: 0 0 0 3px rgba(24,144,255,.12); }
    .error-msg {
      background: #fff2f0; color: #ff4d4f; border: 1px solid #ffa39e;
      border-radius: 6px; padding: 9px 12px; font-size: .85rem;
      margin-bottom: 14px; display: none; text-align: left;
    }
    .error-msg.show { display: block; }
    .btn {
      width: 100%; height: 44px; background: #1890ff; color: #fff;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background .15s; margin-top: 4px;
    }
    .btn:hover { background: #0c6dbd; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .divider { margin: 20px 0; border: none; border-top: 1px solid #f0f0f0; }
    .teacher-link { font-size: .82rem; color: #8c8c8c; text-decoration: none; }
    .teacher-link:hover { color: #1890ff; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🎓</div>
  <h1>Đăng nhập Học Sinh</h1>
  <p class="sub">Nhập tài khoản do giáo viên cung cấp</p>

  <div class="error-msg" id="err"></div>

  <div class="form-group">
    <label for="u">Tên đăng nhập</label>
    <input type="text" id="u" placeholder="Nhập tên đăng nhập" autocomplete="username"/>
  </div>
  <div class="form-group">
    <label for="p">Mật khẩu</label>
    <input type="password" id="p" placeholder="Nhập mật khẩu" autocomplete="current-password"/>
  </div>

  <button class="btn" id="btn" onclick="doLogin()">Đăng nhập</button>

  <hr class="divider"/>
  <a href="teacher.html" class="teacher-link">🔑 Trang giáo viên</a>
</div>

<script>
// Nếu đã đăng nhập thì vào thẳng
const token = localStorage.getItem('student_token');
if (token) {
  fetch('/api/student-auth-check', { headers: { 'x-student-token': token } })
    .then(r => r.json()).then(d => { if (d.ok) location.href = 'index.html'; });
}

async function doLogin() {
  const u = document.getElementById('u').value.trim();
  const p = document.getElementById('p').value;
  const err = document.getElementById('err');
  const btn = document.getElementById('btn');
  if (!u || !p) { err.textContent = 'Vui lòng nhập đầy đủ.'; err.classList.add('show'); return; }

  btn.disabled = true; btn.textContent = 'Đang đăng nhập...';
  err.classList.remove('show');

  try {
    const res = await fetch('/api/student-login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error; err.classList.add('show'); }
    else {
      localStorage.setItem('student_token', data.token);
      localStorage.setItem('student_username', data.username);
      localStorage.setItem('student_fullname', data.fullname);
      location.href = 'index.html';
    }
  } catch { err.textContent = 'Không thể kết nối server.'; err.classList.add('show'); }
  finally { btn.disabled = false; btn.textContent = 'Đăng nhập'; }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
